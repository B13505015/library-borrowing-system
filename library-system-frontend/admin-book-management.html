<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>書籍管理 | Library System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-layout">
    <div class="sidebar">
        <div class="sidebar-brand">Library Admin</div>
        <ul class="sidebar-menu">
            <li><a href="admin-dashboard.html">系統總覽</a></li>
            <li class="active"><a href="admin-book-management.html">書籍管理</a></li>
            <li><a href="admin-user-management.html">使用者管理</a></li>
            <li><a href="admin-borrow-management.html">借閱紀錄管理</a></li>
            <li class="logout"><a href="login.html">登出</a></li>
        </ul>
    </div>

    <main class="admin-main">
        <header class="admin-header">
            <h2>書籍管理</h2>
            <button class="btn btn-primary" id="addBookBtn">＋ 新增書籍</button>
        </header>

        <div class="filter-box card">
            <input type="text" id="adminBookSearchInput" placeholder="搜尋書名或編號...">
            <button id="adminBookSearchBtn" class="btn btn-secondary">搜尋</button>
        </div>

        <div class="card">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>書名</th>
                        <th>出版社</th>
                        <th>狀態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="adminBookTableBody"></tbody>
            </table>
        </div>
    </main>

    <!-- 新增/編輯書籍 Modal -->
    <div id="bookFormModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 id="modalTitle">新增書籍</h3>
            <form id="bookForm">
                <div class="form-group"><label>書名</label><input type="text" id="m-title"></div>
                <div class="form-group"><label>出版社</label><input type="text" id="m-publisher"></div>
                <div class="form-group"><label>出版年</label><input type="number" id="m-year"></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" id="closeBookModal">取消</button>
                    <button type="button" class="btn btn-primary" id="saveBookBtn">儲存書籍</button>
                </div>
            </form>
        </div>
    </div>
    <script src="js/admin-book-management.js"></script>

<!-- 登出確認 Modal -->
<div id="logoutConfirmModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 350px;">
        <div class="modal-header"><h3>確認登出</h3></div>
        <div class="modal-body text-center">
            <p>您確定要離開系統嗎？</p>
        </div>
        <div class="modal-footer logout-footer">
            <button class="btn btn-outline" id="cancelLogoutBtn">取消</button>
            <button class="btn btn-danger" id="confirmLogoutBtn">確定登出</button>
        </div>
    </div>
</div>
</body>
</html>

<!-- 關鍵修改：Modal 的標題與按鈕增加 id 方便動態修改 -->
<div id="bookFormModal" class="modal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">新增書籍</h3>
            <span class="close-modal" id="closeBookModal">&times;</span>
        </div>
        <form id="bookForm">
            <!-- 隱藏欄位，用來存放正在編輯的書籍 ID -->
            <input type="hidden" id="m-book-id">
            
            <div class="form-group">
                <label>書名</label>
                <input type="text" id="m-title" placeholder="請輸入完整書名">
            </div>
            <div class="form-group">
                <label>出版社</label>
                <input type="text" id="m-publisher" placeholder="例如：台大出版">
            </div>
            <div class="form-group">
                <label>出版年</label>
                <input type="number" id="m-year" placeholder="YYYY">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-outline" id="cancelBtn">取消</button>
                <button type="button" class="btn btn-primary" id="saveBookBtn">儲存資料</button>
            </div>
        </form>
    </div>
</div>

<!-- 在每個管理員 HTML 底部引入 -->
<script src="js/common.js"></script>
<script src="js/admin-xxx.js"></script>
