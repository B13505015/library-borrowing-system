<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊 | Library Borrowing System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>註冊圖書館帳號</p>
        </div>

        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="registerStudentNoInput">學號</label>
                <input type="text" id="registerStudentNoInput" placeholder="例如：B13505015" required>
            </div>
            <div class="form-group">
                <label for="registerNameInput">姓名</label>
                <input type="text" id="registerNameInput" placeholder="請輸入真實姓名" required>
            </div>
            <div class="form-group">
                <label for="registerPasswordInput">密碼</label>
                <input type="password" id="registerPasswordInput" placeholder="請輸入密碼" required>
            </div>
            <div class="form-group">
                <label for="confirmPasswordInput">確認密碼</label>
                <input type="password" id="confirmPasswordInput" placeholder="請再次輸入密碼" required>
            </div>

            <!-- 註冊錯誤訊息顯示區 -->
            <div id="registerErrorMessage" class="error-message" style="display: none;"></div>

            <button type="button" id="registerBtn" class="btn btn-primary btn-block">立即註冊</button>
            <button type="button" class="btn btn-outline btn-block" onclick="location.href='login.html'">返回登入</button>
        </form>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
