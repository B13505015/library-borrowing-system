<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>查詢書籍 | Library System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">
    <div class="wrapper">
        <nav class="navbar">
            <div class="navbar-brand">Library System</div>
            <ul class="navbar-nav">
                <li><a href="user-dashboard.html">首頁</a></li>
                <li class="active"><a href="search-books.html">查詢書籍</a></li>
                <li><a href="borrow-records.html">我的借閱紀錄</a></li>
                <li><a href="login.html">登出</a></li>
            </ul>
        </nav>

        <main class="main-content container">
            <header class="content-header">
                <h2>圖書查詢</h2>
            </header>

            <div class="search-box card">
                <div class="search-input-group">
                    <input type="text" id="bookSearchInput" placeholder="輸入書名、關鍵字搜尋...">
                    <button id="bookSearchBtn" class="btn btn-primary">搜尋</button>
                </div>
            </div>

            <div class="card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>書名</th>
                            <th>出版社</th>
                            <th>出版年</th>
                            <th>狀態</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="bookTableBody">
                        <!-- 資料由 JS 渲染 -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- 書籍詳情 Modal (預設隱藏) -->
    <div id="bookDetailModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalBookTitle">書籍詳情</h3>
                <span class="close-modal" id="closeModal">&times;</span>
            </div>
            <div class="modal-body">
                <p><strong>出版社：</strong><span id="modalPublisher"></span></p>
                <p><strong>出版年份：</strong><span id="modalYear"></span></p>
                <p><strong>狀態：</strong><span id="modalStatus" class="badge"></span></p>
                <hr>
                <p id="modalDescription">這是書籍的簡介內容...</p>
            </div>
            <div class="modal-footer">
                <button id="borrowBookBtn" class="btn btn-primary">立即借閱</button>
            </div>
        </div>
    </div>

    <script src="js/search-books.js"></script>
</body>
</html>
