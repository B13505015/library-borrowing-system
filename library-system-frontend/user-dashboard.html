<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人主頁 | Library System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body"> <!-- 使用相同佈局結構 -->
    <div class="wrapper">
        <!-- 頂部導覽列 Navbar -->
        <nav class="navbar">
            <div class="navbar-brand">Library System</div>
            <ul class="navbar-nav">
                <li class="active"><a href="user-dashboard.html">首頁</a></li>
                <li><a href="search-books.html">查詢書籍</a></li>
                <li><a href="borrow-records.html">我的借閱紀錄</a></li>
                <li><a href="login.html">登出</a></li>
            </ul>
        </nav>

        <main class="main-content container">
            <header class="content-header">
                <h2 id="welcomeUser">歡迎回來，使用者！</h2>
                <p>今天是 2026年5月2日</p>
            </header>

            <!-- 逾期提醒區塊 -->
            <div id="userOverdueNotice" class="alert-box danger" style="display: none;">
                <strong>逾期提醒：</strong> 您有書籍已超過歸還期限，請儘速歸還以維持借閱權限。
            </div>

            <section class="dashboard-section">
                <div class="section-header">
                    <h3>借閱中的書籍</h3>
                    <div class="quick-actions">
                        <button class="btn btn-primary btn-sm" onclick="location.href='search-books.html'">我要借書</button>
                    </div>
                </div>
                
                <!-- 借閱卡片區塊 -->
                <div id="currentBorrowedBooks" class="card-grid">
                    <!-- 由 JS 動態生成內容 -->
                </div>
            </section>

            <section class="dashboard-section">
                <h3>快捷功能</h3>
                <div class="stats-grid">
                    <div class="card stat-card clickable" onclick="location.href='search-books.html'">
                        <h4>查詢書籍</h4>
                        <p>瀏覽圖書館藏書</p>
                    </div>
                    <div class="card stat-card clickable" onclick="location.href='borrow-records.html'">
                        <h4>借閱紀錄</h4>
                        <p>查看歷史與還書狀態</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="js/user-dashboard.js"></script>
</body>
</html>

<div class="card">
    <h3>圖書借閱率</h3>
    <div class="progress-container" style="background:#eee; border-radius:10px; height:20px;">
        <!-- 寬度之後由 JS 根據 (借出數/總數) 計算 -->
        <div id="usageBar" style="background:var(--primary-color); width:45%; height:100%; border-radius:10px;"></div>
    </div>
    <p id="usageText" style="font-size:0.8rem; margin-top:5px;">目前借出率：45%</p>
</div>
