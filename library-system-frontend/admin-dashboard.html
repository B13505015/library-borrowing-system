<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>管理員總覽 | Library System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-layout">
    <div class="sidebar">
        <div class="sidebar-brand">Library Admin</div>
        <ul class="sidebar-menu">
            <li class="active"><a href="admin-dashboard.html">系統總覽</a></li>
            <li><a href="admin-book-management.html">書籍管理</a></li>
            <li><a href="admin-user-management.html">使用者管理</a></li>
            <li><a href="admin-borrow-management.html">借閱紀錄管理</a></li>
            <li class="logout"><a href="login.html">登出</a></li>
        </ul>
    </div>

    <main class="admin-main">
        <header class="admin-header">
            <h2>系統運作概況</h2>
            <div class="admin-info">管理員：B13505015</div>
        </header>

        <!-- 統計卡片 -->
        <div class="stats-grid">
            <div class="card stat-card">
                <span class="stat-label">總書籍數</span>
                <div class="stat-value" id="totalBooksValue">--</div>
            </div>
            <div class="card stat-card">
                <span class="stat-label">借出中</span>
                <div class="stat-value" id="borrowedBooksValue">--</div>
            </div>
            <div class="card stat-card">
                <span class="stat-label">使用者數量</span>
                <div class="stat-value" id="totalUsersValue">--</div>
            </div>
            <div class="card stat-card danger">
                <span class="stat-label">逾期未還</span>
                <div class="stat-value" id="overdueBooksValue">--</div>
            </div>
        </div>

        <div class="admin-grid">
            <!-- 最近活動 -->
            <section class="card">
                <h3>最近借閱活動</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>學號</th>
                            <th>書名</th>
                            <th>日期</th>
                        </tr>
                    </thead>
                    <tbody id="recentBorrowTableBody"></tbody>
                </table>
            </section>

            <!-- 逾期列表 -->
            <section class="card">
                <h3>逾期提醒清單</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>學號</th>
                            <th>逾期天數</th>
                        </tr>
                    </thead>
                    <tbody id="overdueTableBody"></tbody>
                </table>
            </section>
        </div>
    </main>
    <script src="js/admin-dashboard.js"></script>

    <!-- 登出確認 Modal -->
<div id="logoutConfirmModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 350px;">
        <div class="modal-header"><h3>確認登出</h3></div>
        <div class="modal-body text-center">
            <p>您確定要離開系統嗎？</p>
        </div>
        <div class="modal-footer logout-footer">
            <button class="btn btn-outline" id="cancelLogoutBtn">取消</button>
            <button class="btn btn-danger" id="confirmLogoutBtn">確定登出</button>
        </div>
    </div>
</div>
</body>
</html>
