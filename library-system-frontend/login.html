<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 | Library Borrowing System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>Library System</h1>
            <p>圖書館借還系統</p>
        </div>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="studentNoInput">學號 / 帳號</label>
                <input type="text" id="studentNoInput" placeholder="請輸入學號" required>
            </div>
            <div class="form-group">
                <label for="passwordInput">密碼</label>
                <input type="password" id="passwordInput" placeholder="請輸入密碼" required>
            </div>

            <!-- 錯誤訊息顯示區 -->
            <div id="loginErrorMessage" class="error-message" style="display: none;"></div>

            <div class="auth-actions">
                <button type="button" id="userLoginBtn" class="btn btn-primary">使用者登入</button>
                <button type="button" id="adminLoginBtn" class="btn btn-secondary">管理員登入</button>
            </div>
        </form>

        <div class="auth-footer">
            <p>還沒有帳號嗎？ <a href="register.html">立即註冊</a></p>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
